version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sairen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sairen
      POSTGRES_PASSWORD: sairen_dev
      POSTGRES_DB: sairen_workflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sairen -d sairen_workflow']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sairen-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  bull-board:
    image: deadly0/bull-board:latest
    container_name: sairen-bull-board
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
